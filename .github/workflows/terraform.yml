name: Terraform Pipeline Template

on:
  workflow_call:
    inputs:
      directories:
        required: true
        type: string

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    strategy:
      matrix:
        directory: ${{ fromJson(inputs.directories) }}

    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init

      - name: Terraform Plan
        run: terraform plan -no-color

  apply:
    name: Terraform Apply
    needs: plan
    runs-on: ubuntu-latest

    environment:
      name: production  # approval obrigatório

    strategy:
      matrix:
        directory: ${{ fromJson(inputs.directories) }}

    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve