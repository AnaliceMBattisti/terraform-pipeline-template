name: Terraform Pipeline Template
on:
  workflow_call:
    inputs:
      directories:
        required: true
        type: string
      wif_provider:
        required: true
        type: string
      service_account:
        required: true
        type: string

jobs:
  plan:
    name: "Plan · ${{ matrix.directory }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    strategy:
      fail-fast: true
      matrix:
        directory: ${{ fromJson(inputs.directories) }}
    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -detailed-exitcode 2>&1 | tee plan-output.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          echo "exit_code=$PLAN_EXIT" >> $GITHUB_OUTPUT
          set -e

          if [ "$PLAN_EXIT" -eq 1 ]; then
            echo "::error::Terraform plan falhou em ${{ matrix.directory }}"
            exit 1
          fi

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const dir = '${{ matrix.directory }}';
            const exitCode = '${{ steps.plan.outputs.exit_code }}';
            const planOutput = fs.readFileSync('${{ matrix.directory }}/plan-output.txt', 'utf8');

            const header = exitCode === '1'
              ? `#### ❌ Terraform Plan FALHOU — \`${dir}\``
              : `#### Terraform Plan 📖 \`${dir}\``;

            const body = `${header}
            <details><summary>Ver output completo</summary>

            \`\`\`terraform
            ${planOutput}
            \`\`\`
            </details>`;

            const marker = `<!-- terraform-plan:${dir} -->`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: marker + '\n' + body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: marker + '\n' + body
              });
            }

      - name: Post Plan to Summary
        if: always()
        run: |
          EXIT_CODE="${{ steps.plan.outputs.exit_code }}"

          if [ "$EXIT_CODE" = "1" ]; then
            echo "### ❌ Terraform Plan FALHOU — \`${{ matrix.directory }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Terraform Plan 📖 \`${{ matrix.directory }}\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Ver output completo</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```terraform' >> $GITHUB_STEP_SUMMARY
          cat plan-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

  apply:
    name: "Apply · ${{ matrix.directory }}"
    needs: plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: awaiting-apply-approval   # ← renomeado e mais descritivo
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: true
      matrix:
        directory: ${{ fromJson(inputs.directories) }}
    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ inputs.wif_provider }}
          service_account: ${{ inputs.service_account }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: true

      - run: terraform init

      - name: Terraform Apply
        id: apply
        run: |
          set +e
          terraform apply -auto-approve -no-color 2>&1 | tee apply-output.txt
          APPLY_EXIT=${PIPESTATUS[0]}
          echo "exit_code=$APPLY_EXIT" >> $GITHUB_OUTPUT
          set -e

          if [ "$APPLY_EXIT" -ne 0 ]; then
            echo "::error::Apply falhou em ${{ matrix.directory }}"
            exit 1
          fi

      - name: Post Apply Result to Summary
        if: always()
        run: |
          EXIT_CODE="${{ steps.apply.outputs.exit_code }}"
          DIR="${{ matrix.directory }}"

          if [ "$EXIT_CODE" = "0" ]; then
            echo "### ✅ Apply concluído — \`$DIR\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Apply FALHOU — \`$DIR\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ⚠️ **Atenção:** recursos podem estar em estado parcial." >> $GITHUB_STEP_SUMMARY
            echo "> Verifique o state com \`terraform state list\` antes de re-aplicar." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Ver output completo</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```terraform' >> $GITHUB_STEP_SUMMARY
          cat apply-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
